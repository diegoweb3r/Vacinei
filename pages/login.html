<!doctype html>
<html lang="pt-br">
  <head>
    <!--Meta-->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vacinei: A forma mais segura e fácil de gerenciar sua carteira de vacinação digital. Receba alertas e mantenha seu histórico sempre à mão.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="VACINEI - Sua Carteira de Vacinas Digital">
    <meta property="og:description" content="Controle suas vacinas de forma simples e segura.">
    <meta property="og:image" content="https://seusite.com/assets/images/og-image.jpg">
    <meta property="twitter:card" content="summary_large_image">
    <!--Links-->
    <link rel="icon" href="../assets/flaticon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/modules/header.css">
    <link rel="stylesheet" href="../css/modules/hero.css">
    <link rel="stylesheet" href="../css/modules/features.css">
    <link rel="stylesheet" href="../css/modules/footer.css">
    <link rel="stylesheet" href="../css/modules/cadastro.css">
    <link rel="stylesheet" href="../css/modules/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <!--Title-->
    <title>VACINEI | Sua Carteira de vacinas Digital</title>
  </head>

  <body>
    <header id="navbar">
        <div class="navbar__logo-container">
            <img src="../assets/images/vacinei-logo.png" alt="logo vacinei" class="navbar__logo-image">
            <p class="navbar__logo-text">Vacinei</p>
        </div>
        <div class="navbar__links-container">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#features">Funcionalidades</a></li>
                <li><a href="/pages/login.html" class="nav-link-login">Entrar</a></li>
                <li><a href="/pages/cadastro.html" class="bttn">Cadastrar</a></li>
            </ul>
        </div>
    </header>


    <main id="login-section" class="auth-wraper">
        <img class="create-account__image"src="../assets/images/persona.png" alt="icone de login">
        <h2 class="create-account__title">Acesse sua conta</h2>
        <p class="create-account__description">Mantenha seu histórico de vacinas atualizado!</p>
        <form action="#" method="POST" class="auth-form">
                      <div class="input-group"> 
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="email@email.com" required>
            </div>
            <div class="input-group">    
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" minlength="8" required>
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>
            <button type="submit" class="bttn">Acessar</button>

            <div class="auth_footer">
                <p>Não possui uma conta? <a href="/pages/cadastro.html">Cadastre-se</a></p>

            </div>
        </form>
    </main>
  </body>
</html>
